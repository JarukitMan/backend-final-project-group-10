stages:
  - deploy

deploy_to_server:
  stage: deploy
  image: alpine
  before_script:
    - apk add --no-cache openssh-client bash
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H 10.34.112.171 >> ~/.ssh/known_hosts
  script:
    - echo "Entering source folder..."
    - cd nest-prisma-lab
    - echo "Creating .env..."
    - echo "DATABASE_URL=$DATABASE_URL\nJWT_SECRET=$JWT_SECRET" > .env
    - echo "Deploying on the server..."
    - scp -r . "student@10.34.112.171:/home/student/Websites/deploy/"
    - ssh "student@10.34.112.171" "cd /home/student/Websites/deploy/; docker login -u $DOCKERHUB_USERNAME -p $DOCKERHUB_PASSWORD; docker build --pull -t $DOCKERHUB_REPO; docker run $DOCKERHUB_REPO -d; docker push $DOCKERHUB_REPO; docker logout"
    - echo "Script done."
